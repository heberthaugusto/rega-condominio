<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f1a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rega" />
  <title>Rega do Condomínio</title>
  <meta name="app-version" content="1.0.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/rega-condominio/sw.js', { scope: '/rega-condominio/' })
        .then(reg => console.log('SW registrado:', reg.scope))
        .catch(e => console.warn('SW erro:', e));
    }
  </script>

  <!-- FCM: notificações gerenciadas pelo script principal -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0f1a0f; font-family: 'DM Sans', sans-serif; color: #e8f5e8; }
    body { overflow-x: hidden; }
    #app { min-height: 100dvh; max-width: 480px; margin: 0 auto; position: relative; }
    button { font-family: 'DM Sans', sans-serif; cursor: pointer; }
    input { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0f1a0f; }
    ::-webkit-scrollbar-thumb { background: #2a3a2a; border-radius: 2px; }

    /* BG texture */
    .bg-texture {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      opacity: 0.04;
      background-image: radial-gradient(circle, #4ade80 1px, transparent 1px);
      background-size: 24px 24px;
    }

    /* LOGIN */
    #login-screen {
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 24px;
      position: relative; z-index: 1;
    }
    .login-logo { font-size: 52px; margin-bottom: 8px; }
    .login-title { color: #4ade80; font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .login-sub { color: #4ade8066; font-size: 14px; margin-top: 6px; margin-bottom: 32px; }
    .user-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; max-width: 340px; margin-bottom: 24px; }
    .user-btn {
      background: #162016; border: 2px solid #2a3a2a; border-radius: 12px;
      padding: 12px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px;
      transition: all 0.15s;
    }
    .user-btn.selected { background: var(--user-color-alpha); border-color: var(--user-color); }
    .user-btn span { font-size: 12px; font-weight: 600; color: #8aab8a; }
    .user-btn.selected span { color: var(--user-color); }
    .avatar {
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: #0f1a0f; flex-shrink: 0;
    }
    .password-area { width: 100%; max-width: 340px; animation: fadeIn 0.2s ease; }
    .password-area input {
      width: 100%; padding: 14px 16px; border-radius: 12px;
      border: 2px solid #2a3a2a; background: #162016; color: #e8f5e8;
      font-size: 16px; outline: none; margin-bottom: 12px;
    }
    .password-area input:focus { border-color: #4ade8066; }
    .login-error { color: #fb7185; font-size: 13px; text-align: center; margin-bottom: 12px; }
    .login-btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      font-weight: 800; font-size: 16px; letter-spacing: -0.5px;
      color: #0f1a0f; transition: opacity 0.15s;
    }
    .login-btn:active { opacity: 0.8; }

    /* MAIN APP */
    #main-app { display: none; flex-direction: column; min-height: 100dvh; position: relative; z-index: 1; }
    #main-app.visible { display: flex; }

    /* HEADER */
    .header {
      padding: 14px 16px 10px; background: #0f1a0fa0;
      backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10;
      border-bottom: 1px solid #1e2e1e;
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header-brand { display: flex; align-items: center; gap: 10px; }
    .header-brand-icon { font-size: 24px; }
    .header-brand-name { font-size: 18px; font-weight: 800; color: #4ade80; letter-spacing: -0.5px; }
    .header-brand-sub { font-size: 11px; color: #4a6a4a; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .notif-btn {
      background: #1e2e1e; border: 1px solid #2a3a2a; border-radius: 8px;
      padding: 6px 10px; color: #fbbf24; font-size: 12px; font-weight: 600;
    }
    .user-header { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .user-header-name { font-size: 13px; font-weight: 700; }
    .user-header-sub { font-size: 10px; color: #4a6a4a; }
    .next-day-banner {
      margin-top: 10px; padding: 10px 14px; border-radius: 10px;
      display: flex; align-items: center; gap: 10px;
    }
    .next-day-banner .icon { font-size: 20px; }
    .next-day-label { font-size: 12px; font-weight: 700; }
    .next-day-date { font-size: 13px; color: #e8f5e8; }

    /* NAV MÊS */
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px 6px;
    }
    .month-nav-btn {
      background: #1e2e1e; border: 1px solid #2a3a2a; border-radius: 8px;
      padding: 6px 14px; color: #e8f5e8; font-size: 18px;
    }
    .month-nav-title { font-size: 18px; font-weight: 800; color: #4ade80; letter-spacing: -0.5px; }

    /* CALENDÁRIO */
    .dow-labels { display: grid; grid-template-columns: repeat(7,1fr); padding: 0 10px 2px; }
    .dow-label { text-align: center; font-size: 11px; font-weight: 700; color: #4a6a4a; padding: 4px 0; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); padding: 0 10px 10px; gap: 3px; }
    .cal-cell {
      aspect-ratio: 1; border-radius: 10px; padding: 4px;
      background: #162016; border: 1.5px solid #1e2e1e;
      display: flex; flex-direction: column; align-items: center;
      justify-content: space-between; transition: all 0.1s; position: relative;
      overflow: hidden;
    }
    .cal-cell:active { transform: scale(0.92); }
    .cal-cell.today { background: #1e3a1e; border: 2px solid #4ade80; }
    .cal-cell.my-day { border-color: var(--cell-color-alpha); }
    .cal-cell-num {
      font-size: 12px; font-weight: 600; color: #e8f5e8;
      align-self: flex-start; line-height: 1;
    }
    .cal-cell.today .cal-cell-num { color: #4ade80; font-weight: 800; font-size: 13px; }
    .cal-cell-indicator { display: flex; flex-direction: column; align-items: center; gap: 1px; }
    .cal-cell-indicator .emoji { font-size: 13px; line-height: 1; }
    .mini-avatar {
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #0f1a0f;
    }

    /* LEGENDA */
    .legend {
      margin: 0 10px 16px; background: #162016; border-radius: 12px;
      padding: 12px 14px;
    }
    .legend-title { font-size: 11px; font-weight: 700; color: #4a6a4a; margin-bottom: 8px; letter-spacing: 1px; }
    .legend-items { display: flex; flex-wrap: wrap; gap: 6px 16px; margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #8aab8a; }
    .legend-users { display: flex; flex-wrap: wrap; gap: 4px 12px; }
    .legend-user { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #8aab8a; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: #000000bb; z-index: 100;
      display: flex; align-items: flex-end; animation: fadeIn 0.15s ease;
    }
    .modal-sheet {
      width: 100%; max-width: 480px; margin: 0 auto;
      background: #162016; border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px; animation: slideUp 0.22s ease;
    }
    .modal-date-dow { font-size: 13px; color: #4a6a4a; text-align: center; margin-bottom: 4px; }
    .modal-date { font-size: 24px; font-weight: 800; color: #4ade80; text-align: center; letter-spacing: -1px; margin-bottom: 20px; }
    .modal-info-box {
      background: #0f1a0f; border-radius: 12px; padding: 14px;
      margin-bottom: 12px; display: flex; align-items: center; gap: 12px;
    }
    .modal-info-box .big-emoji { font-size: 28px; }
    .modal-info-title { font-weight: 700; font-size: 15px; }
    .modal-info-sub { font-size: 13px; color: #4a6a4a; margin-top: 2px; }
    .modal-record {
      border-radius: 10px; padding: 10px 14px; margin-bottom: 8px;
      display: flex; align-items: center; gap: 10px;
    }
    .modal-record .rec-emoji { font-size: 18px; }
    .modal-record .rec-title { font-size: 13px; font-weight: 700; }
    .modal-record .rec-sub { font-size: 12px; color: #4a6a4a; }
    .modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .action-btn {
      padding: 14px; border-radius: 12px; border: none;
      font-weight: 800; font-size: 15px; width: 100%;
      transition: opacity 0.15s;
    }
    .action-btn:active { opacity: 0.8; }
    .action-btn-outline {
      padding: 13px; border-radius: 12px; font-weight: 700;
      font-size: 14px; width: 100%; background: transparent;
      transition: opacity 0.15s;
    }
    .action-btn-outline:active { opacity: 0.7; }
    .action-btn-close {
      padding: 12px; border-radius: 12px; border: 1px solid #2a3a2a;
      background: transparent; color: #4a6a4a; font-weight: 600;
      font-size: 14px; width: 100%;
    }

    /* BOTÃO DE NOTIFICAÇÃO NA TELA DE LOGIN */
    .notif-login-btn {
      margin-top: 16px; padding: 12px 24px; border-radius: 12px;
      border: 1px solid #4ade8044; background: #162016;
      color: #4ade80; font-size: 14px; font-weight: 700;
      font-family: 'DM Sans', sans-serif; cursor: pointer;
      transition: background 0.15s;
    }
    .notif-login-btn:active { background: #1e3a1e; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      background: #1e3a1e; border: 1px solid #4ade8044; border-radius: 12px;
      padding: 12px 20px; color: #4ade80; font-weight: 600; font-size: 14px;
      z-index: 200; animation: slideUp 0.2s ease; white-space: nowrap;
      box-shadow: 0 4px 24px #00000066;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    .shake { animation: shake 0.4s ease; }

    /* BANNER DE ATUALIZAÇÃO */
    .update-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      background: #4ade80; color: #0f1a0f; padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; animation: slideDown 0.3s ease; max-width: 480px; margin: 0 auto;
      box-shadow: 0 4px 16px #00000044;
    }
    .update-banner-text { font-size: 13px; font-weight: 700; flex: 1; }
    .update-banner-btn {
      background: #0f1a0f; color: #4ade80; border: none; border-radius: 8px;
      padding: 6px 14px; font-size: 13px; font-weight: 800; cursor: pointer;
      font-family: inherit; white-space: nowrap;
    }
    .update-banner-dismiss {
      background: transparent; border: none; color: #0f1a0f44;
      font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1;
    }
    @keyframes slideDown { from { opacity:0; transform:translateY(-100%); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div class="bg-texture"></div>
<div id="app">
  <!-- LOGIN -->
  <div id="login-screen">

  <!-- MAIN APP -->
  <div id="main-app">
    <div class="header">
      <div class="header-top">
        <div class="header-brand">
          <div class="header-brand-icon">🌿</div>
          <div>
            <div class="header-brand-name">Rega</div>

    <div class="dow-labels">
      <div class="dow-label">Dom</div><div class="dow-label">Seg</div>
      <div class="dow-label">Ter</div><div class="dow-label">Qua</div>
      <div class="dow-label">Qui</div><div class="dow-label">Sex</div>
      <div class="dow-label">Sáb</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>

    <div class="legend">
      <div class="legend-title">LEGENDA</div>
      <div class="legend-items">
        <div class="legend-item">✅ Regado</div>
        <div class="legend-item">🙋 Voluntário</div>
        <div class="legend-item">⏭️ Não pôde</div>
        <div class="legend-item">🌧️ Chuva/dispensa</div>
      </div>
      <div class="legend-users" id="legend-users"></div>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal" style="display:none" onclick="closeModal(event)">
    <div class="modal-sheet" id="modal-sheet"></div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast" style="display:none"></div>

  <!-- BANNER DE ATUALIZAÇÃO -->
  <div class="update-banner" id="update-banner" style="display:none">
    <div class="update-banner-text">🆕 Nova versão disponível!</div>
    <button class="update-banner-btn" onclick="doUpdate()">Atualizar</button>
    <button class="update-banner-dismiss" onclick="dismissUpdate()">✕</button>
  </div>
</div>

<script type="module">
// ═══════════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════════
import { initializeApp }                                          from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, deleteField } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js';
// firebase-messaging não é suportado no Safari/iOS — importado de forma lazy apenas quando necessário

const firebaseConfig = {
  apiKey: "AIzaSyA3HU10fU1DA6NMzut1d90HPAzax5VQckM",
  authDomain: "rega-condominio.firebaseapp.com",
  projectId: "rega-condominio",
  storageBucket: "rega-condominio.firebasestorage.app",
  messagingSenderId: "243899083664",
  appId: "1:243899083664:web:581388c6e5b1c23dcc6115"
};

const _app = initializeApp(firebaseConfig);
const db   = getFirestore(_app);

// Expõe instâncias globalmente
window.db = db;
window.__firebase_app_instance = _app;

// ═══════════════════════════════════════════════════════
// CONFIGURAÇÃO
// ═══════════════════════════════════════════════════════
// Senhas armazenadas como hashes SHA-256 — nunca em texto puro
const USERS = [
  { id: 'heberth', name: 'Heberth', passwordHash: 'db2a4e1358385f65fcdb1747589c322c8c657a9de9693a8419014bd1d3349df5', color: '#4ade80' },
  { id: 'simone',  name: 'Simone',  passwordHash: '951e116844f077a7bc627254df2c5b2f2b540d3ff82cda6afa4b7203b50c516b', color: '#60a5fa' },
  { id: 'flavio',  name: 'Flávio',  passwordHash: 'c75161c0b583736ee0f845aa587a24d7db8baec2d640962428f3b18fa6622d2e', color: '#f97316' },
  { id: 'bruno',   name: 'Bruno',   passwordHash: '07e15c0073810c825953b1dbb7a2c085624b67d2e3f4a36780a6546d3d53b3aa', color: '#a78bfa' },
  { id: 'luciano', name: 'Luciano', passwordHash: 'bf81eff9dda8005ff2bc44366f8b7d5faeafc975db94608e50bcae05e9df7264', color: '#fb7185' },
  { id: 'karina',  name: 'Karina',  passwordHash: '40f9644c963231ccddd945fe64f5cce4a8d98c54504b3dbdb6568fef5a3a3e10', color: '#fbbf24' },
];

// Grupo A: âncora = Simone em 21/05/2026
// GROUP_A começa em Simone; idx 0=simone, 1=flávio, 2=bruno, 3=luciano, 4=heberth, depois repete
const GROUP_A  = ['simone', 'flavio', 'bruno', 'luciano', 'heberth'];
const START_A  = new Date(2026, 4, 21); // 21/05/2026 — âncora: Simone
const START_K  = new Date(2026, 4, 17); // 17/05/2026 — Karina: domingo sim/não (17→31→14/06…)

// ═══════════════════════════════════════════════════════
// UTILITÁRIOS DE DATA
// ═══════════════════════════════════════════════════════
const toKey  = d => `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
const p2     = n => String(n).padStart(2,'0');
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
const isSun  = d => d.getDay() === 0;
const todayD = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const cloneD = d => new Date(d.getTime());

const MONTH_NAMES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                     'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DOW_NAMES   = ['domingo','segunda-feira','terça-feira','quarta-feira',
                     'quinta-feira','sexta-feira','sábado'];

const getUserById = id => USERS.find(u => u.id === id);

// ═══════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════
let currentUser   = null;
let selectedUserId = null;
let currentMonth  = new Date(new Date().getFullYear(), new Date().getMonth(), 1); // mês vigente
let records    = {}; // { 'YYYY-MM-DD': { by, at } }
let rainDays   = {}; // { 'YYYY-MM-DD': true }
let skipped    = {}; // { 'YYYY-MM-DD': { by, at } }
let volunteered = {}; // { 'YYYY-MM-DD': { by, at } }
let swaps      = {}; // { 'YYYY-MM-DD': { skippedBy: userId, coveredBy: userId } }
                     // quando coveredBy cobre skippedBy, o próximo slot de coveredBy vai para skippedBy

// ═══════════════════════════════════════════════════════
// FIREBASE STORAGE — COMPARTILHADO EM TEMPO REAL
// ═══════════════════════════════════════════════════════
async function loadAll() {
  console.log('[Firebase] loadAll iniciado, db:', db);
  try {
    const ref  = doc(db, 'rega', 'dados');
    const snap = await getDoc(ref);
    console.log('[Firebase] snap.exists():', snap.exists());
    if (snap.exists()) {
      const d     = snap.data();
      console.log('[Firebase] dados carregados:', d);
      records     = d.records     || {};
      rainDays    = d.rain        || {};
      skipped     = d.skipped     || {};
      volunteered = d.volunteered || {};
      swaps       = d.swaps       || {};
    }
  } catch(e) {
    console.warn('[Firebase] loadAll error:', e);
    records = {}; rainDays = {}; skipped = {}; volunteered = {}; swaps = {};
  }
}

// Remove campos específicos do Firestore usando deleteField + dot notation
// Isso garante remoção real dos campos, diferente de salvar {} com merge:true
async function saveDelete(fields) {
  try {
    await updateDoc(doc(db, 'rega', 'dados'), fields);
  } catch(e) {
    console.error('[saveDelete] Erro:', e);
    throw e;
  }
}

async function save(key, data) {
  const keyMap = {
    'rega-records': 'records', 'rega-rain': 'rain',
    'rega-skipped': 'skipped', 'rega-volunteered': 'volunteered',
    'rega-swaps': 'swaps'
  };
  const mapped = keyMap[key];

let unsubscribeSnapshot = null;

function startSync() {
  if (unsubscribeSnapshot) unsubscribeSnapshot();
  unsubscribeSnapshot = onSnapshot(doc(db, 'rega', 'dados'), (snap) => {
    if (!snap.exists() || !currentUser) return;
    const d          = snap.data();
    const newRecords     = d.records     || {};
    const newRain        = d.rain        || {};
    const newSkipped     = d.skipped     || {};
    const newVolunteered = d.volunteered || {};
    const newSwaps       = d.swaps       || {};

    const changed =
      JSON.stringify(newRecords)     !== JSON.stringify(records)     ||
      JSON.stringify(newRain)        !== JSON.stringify(rainDays)    ||
      JSON.stringify(newSkipped)     !== JSON.stringify(skipped)     ||
      JSON.stringify(newVolunteered) !== JSON.stringify(volunteered) ||
      JSON.stringify(newSwaps)       !== JSON.stringify(swaps);

    if (changed) {
      records     = newRecords;
      rainDays    = newRain;
      skipped     = newSkipped;
      volunteered = newVolunteered;
      swaps       = newSwaps;
      renderCalendar();
      renderNextDay();
      showSyncToast();
    }
  }, (err) => console.warn('Snapshot error:', err));
}

function stopSync() {
  if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
}

function showSyncToast() {
  const t = document.getElementById('toast');
  t.textContent = '🔄 Calendário atualizado!';
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2000);
}

// ═══════════════════════════════════════════════════════
// ALGORITMO DE CALENDÁRIO
// ═══════════════════════════════════════════════════════
// Retorna objeto { 'YYYY-MM-DD': { groupA?: userId, karina?: true } }
//
// REGRAS DO GRUPO A (a partir de 21/05/2026, âncora = Simone):
//   • Molha 1 dia, folga 2 dias → próximo = cur + 3
//   • Nunca em domingo
//   • Regra Karina: se o candidato calculado cair no dia ANTERIOR a um domingo
//     da Karina (véspera = sábado), NÃO marca esse dia e reposiciona o
//     candidato para o 3º dia após o domingo da Karina.
//     Ex: Karina = dom 31/05 → candidato em 30/05 (sáb) → move para 03/06 (ter)
//
// Karina: domingos alternados a partir de START_K, independente do Grupo A.
function buildSchedule(fromDate, toDate) {
  const sched = {};

  // ── Monta set de domingos da Karina ──────────────────────────────────────
  const karinaSundays = new Set();
  let ktmp = cloneD(START_K);
  while (ktmp <= addDays(toDate, 14)) {
    karinaSundays.add(toKey(ktmp));
    ktmp = addDays(ktmp, 14);
  }

  // ── Karina: registra no schedule ─────────────────────────────────────────
  let kd = cloneD(START_K);
  while (kd <= toDate) {
    if (kd >= fromDate) {
      const k = toKey(kd);
      sched[k] = sched[k] || {};
      sched[k].karina = true;
    }
    kd = addDays(kd, 14);
  }

  // ── Grupo A ───────────────────────────────────────────────────────────────
  // Resolve um candidato para o próximo slot válido aplicando todas as regras
  // em loop até não haver mais conflito.
  //
  // Prioridade (verificada nesta ordem):
  //   1. CHUVA: candidato caiu num dia de chuva → 3º dia após a chuva (+3)
  //   2. KARINA — próprio domingo → domingo+3 (quarta-feira)
  //   3. KARINA — véspera (sábado antes) → domingo+3 (quarta-feira)
  //   4. KARINA — segunda ou terça imediatamente após o domingo → quarta (domingo+3)
  //   5. Qualquer outro domingo → +1

  function isPostKarina(d) {
    const dow = d.getDay();
    if (dow !== 1 && dow !== 2) return false; // só seg (1) e ter (2)
    const lastSunKey = toKey(addDays(d, -dow));
    return karinaSundays.has(lastSunKey);
  }

  function karinaBaseSun(d) {
    // retorna o domingo da Karina que antecede d (d é seg ou ter após Karina)
    return addDays(d, -d.getDay());
  }

  function nextValid(candidate) {
    let d = cloneD(candidate);
    for (let guard = 0; guard < 60; guard++) {
      const key   = toKey(d);
      const prev1 = toKey(addDays(d, -1)); // ontem
      const prev2 = toKey(addDays(d, -2)); // anteontem

      // Regra chuva = mesma regra do Grupo A:
      // chuva conta como dia regado → 2 dias de folga → próximo = chuva+3
      // 1a. Candidato é o dia da chuva → vai para chuva+3
      if (rainDays[key])   { d = addDays(d, 3); continue; }
      // 1b. Candidato é chuva+1 (1º dia de folga) → vai para chuva+3 (= d+2)
      if (rainDays[prev1]) { d = addDays(d, 2); continue; }
      // 1c. Candidato é chuva+2 (2º dia de folga) → vai para chuva+3 (= d+1)
      if (rainDays[prev2]) { d = addDays(d, 1); continue; }

      // 2. Próprio domingo da Karina → domingo+3 (quarta)
      if (karinaSundays.has(key)) { d = addDays(d, 3); continue; }

      // 3. Véspera (sábado) de domingo da Karina → domingo+3 (quarta)
      if (karinaSundays.has(toKey(addDays(d, 1)))) { d = addDays(d, 4); continue; }

      // 4. Segunda ou terça imediatamente após domingo da Karina → quarta (domingo+3)
      if (isPostKarina(d)) { d = addDays(karinaBaseSun(d), 3); continue; }

      // Grupo A pode regar em qualquer domingo comum (só domingos da Karina são bloqueados)
      return d;
    }
    return d;
  }

  let cur = cloneD(START_A);
  let idx = 0;

  while (cur <= toDate) {
    // nextValid já aplica todas as regras: chuva, Karina (domingo/véspera/seg-ter), domingo comum
    cur = nextValid(cur);
    if (cur > toDate) break;

    const curKey = toKey(cur);

    // Registra o responsável
    if (cur >= fromDate) {
      sched[curKey] = sched[curKey] || {};
      sched[curKey].groupA = GROUP_A[idx % GROUP_A.length];
    }

    idx++;

    // Próximo candidato: molha 1, folga 2 → +3 dias
    cur = addDays(cur, 3);
  }

  return sched;
}

function getScheduleFor(d) {
  // Gera 3 meses à frente para garantir que swaps encontrem o próximo slot do coveredBy
  const to      = new Date(d.getFullYear(), d.getMonth()+3, 0);
  const bigFrom = new Date(2026, 4, 17);
  return buildSchedule(bigFrom, to);
}

function getResponsible(dateKey, sched) {
  const s = sched[dateKey];
  if (!s) return null;
  if (s.karina) return 'karina';
  if (!s.groupA) return null;

  const base = s.groupA;

  // Verifica se este slot é o PRÓXIMO slot do coveredBy após um swap
  // Se sim, passa para o skippedBy (pessoa que foi coberta)
  for (const [swapDate, swap] of Object.entries(swaps)) {
    if (swap.coveredBy !== base) continue;
    if (swapDate >= dateKey) continue;
    // Este é o próximo slot do coveredBy após o swap?
    const isNextSlot = isNextSlotAfterSwap(swap.coveredBy, swapDate, dateKey, sched);
    if (isNextSlot) return swap.skippedBy;
  }

  return base;
}

// Verifica se dateKey é o próximo slot de userId após swapDate no calendário base
function isNextSlotAfterSwap(userId, swapDate, dateKey, sched) {
  // Percorre o calendário base procurando o próximo slot do userId após swapDate
  const entries = Object.entries(sched)
    .filter(([d, s]) => s.groupA === userId && d > swapDate)
    .sort(([a], [b]) => a.localeCompare(b));
  if (entries.length === 0) return false;
  return entries[0][0] === dateKey;
}

// NOTIFICAÇÕES — Web Push nativo (VAPID)
// Compatível com Android Chrome e iOS Safari 16.4+ (PWA instalado)
// ═══════════════════════════════════════════════════════
const VAPID_PUBLIC_KEY = 'BJNUDISSu-_hn1c8VxcsV9I_8oePTVeiMoyFvetvxFeY3LQeNVAfxrBv3Gk7KzaSj_4Bo_H6BaNj8tAX57c9-ec';

function isPushSupported() {
  return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
}

function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
}

function isStandalone() {
  return window.matchMedia('(display-mode: standalone)').matches ||
         window.navigator.standalone === true;
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64  = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw     = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function initPush() {
  // iOS sem PWA instalado: mostra instrução
  if (isIOS() && !isStandalone()) {
    showToast('📲 Para receber alertas: Safari → Compartilhar → "Adicionar à Tela de Início", depois abra pelo ícone');
    return;
  }

  if (!isPushSupported()) {
    showToast('❌ Seu navegador não suporta notificações push');
    return;
  }

  try {
    // ETAPA 1 — pedir permissão
    // Deve ser o primeiro await após o gesto — crítico para iOS
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      showToast(permission === 'denied'
        ? '🔕 Bloqueado. Habilite em Ajustes → Safari → Notificações.'
        : '⚠️ Permissão não concedida.');
      checkNotifButton();
      return;
    }

    // ETAPA 2 — subscription + salvar
    await completePushSubscription();

  } catch(e) {
    console.error('[Push] initPush erro:', e.name, e.message);
    showToast('❌ Erro: ' + (e.message || e.name));
  }
}

// Cria ou recupera a subscription e salva no Firestore
async function completePushSubscription() {
  try {
    // navigator.serviceWorker.ready é a forma mais compatível com iOS
    // Não usamos wrapper customizado — evita timeout e condições de corrida
    const reg = await navigator.serviceWorker.ready;

    let sub = await reg.pushManager.getSubscription();

    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    }

    if (!currentUser) {
      // Sem usuário logado ainda — subscription criada mas salva depois no showApp
      console.log('[Push] Permissão concedida, subscription aguarda login');
      checkNotifButton();
      return;
    }

    await savePushSubscription(sub);

  } catch(e) {
    console.error('[Push] completePushSubscription erro:', e.name, e.message);
    showToast('❌ Erro ao salvar alerta: ' + (e.message || e.name));
  }
}

// Salva subscription no Firestore — separado para reuso no showApp
async function savePushSubscription(sub) {
  const subJson = sub.toJSON();
  // ID único por dispositivo: evita sobrescrever outro dispositivo do mesmo usuário
  const deviceId = btoa(subJson.endpoint).slice(-20).replace(/[^a-zA-Z0-9]/g, '_');
  const fieldKey = currentUser.id + '_' + deviceId;

  await setDoc(doc(db, 'rega', 'subscriptions'), {
    [fieldKey]: {
      endpoint: subJson.endpoint,
      keys: subJson.keys,
      userId: currentUser.id,
      deviceId: deviceId,
      updatedAt: new Date().toISOString(),
    }
  }, { merge: true });

  console.log('[Push] ✅ Subscription salva:', fieldKey);
  showToast('✅ Alertas vinculados a ' + currentUser.name + '!');
  checkNotifButton();
}

function checkNotifButton() {
  const granted  = isPushSupported() && Notification.permission === 'granted';
  const iosNoApp = isIOS() && !isStandalone();

  // Botão no header (pós-login)
  const btn = document.getElementById('notif-btn');
  if (btn) {
    if (!isPushSupported() && !iosNoApp) { btn.style.display = 'none'; }
    else if (granted)                    { btn.style.display = 'none'; }
    else                                 { btn.style.display = 'flex'; }
  }

  // Botão na tela de login (pré-login) — esconde após permissão concedida
  const loginBtn = document.getElementById('notif-login-btn');
  if (loginBtn) {
    loginBtn.style.display = (granted || iosNoApp || !isPushSupported()) ? 'none' : 'block';
  }
}

function selectUser(userId) {
  selectedUserId = userId;
  document.querySelectorAll('.user-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', USERS[i].id === userId);
  });
  const u = getUserById(userId);
  const passArea = document.getElementById('password-area');
  passArea.style.display = 'block';
  const btn = document.getElementById('login-btn');
  btn.style.background = u.color;
  document.getElementById('password-input').value = '';
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('password-input').focus();
}

async function doLogin() {
  if (!selectedUserId) return;
  const u = getUserById(selectedUserId);
  const passRaw = document.getElementById('password-input').value;
  // Compara hash SHA-256 da senha digitada com o hash armazenado
  const encoder = new TextEncoder();
  const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(passRaw));
  const hashArray  = Array.from(new Uint8Array(hashBuffer));
  const hashHex    = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  if (hashHex === u.passwordHash) {
    currentUser = u;
    localStorage.setItem('rega_logged_user', u.id);
    showApp();
  } else {
    const errEl = document.getElementById('login-error');
    errEl.style.display = 'block';
    const passArea = document.getElementById('password-area');
    passArea.classList.add('shake');
    setTimeout(() => passArea.classList.remove('shake'), 500);
  }
}

function logout() {
  stopSync();
  currentUser = null;
  localStorage.removeItem('rega_logged_user');
  document.getElementById('main-app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  selectedUserId = null;
  document.getElementById('password-area').style.display = 'none';
  document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('selected'));
}

function renderNextDay() {
  const banner = document.getElementById('next-day-banner');
  const sched  = buildSchedule(new Date(2026,4,1), addDays(todayD(), 120));
  const t = todayD();

  // Busca próximo dia do usuário atual
  for (let i = 0; i <= 120; i++) {
    const d = addDays(t, i);
    const key = toKey(d);
    const resp = getResponsible(key, sched);
    if (resp !== currentUser.id) continue;
    if (records[key]) continue;
    // Verifica chuva — pula se for dia de chuva ou um dos 2 dias de folga seguintes
    const p1 = toKey(addDays(d,-1));
    const p2 = toKey(addDays(d,-2));
    if (rainDays[key] || rainDays[p1] || rainDays[p2]) continue;
    // Encontrou!
    const label = i === 0 ? 'Hoje é seu dia de regar! 💧' :
                  i === 1 ? 'Amanhã é seu dia de regar!' :
                  `Sua próxima rega`;
    document.getElementById('next-day-label').textContent = label;
    document.getElementById('next-day-date').textContent =
      d.toLocaleDateString('pt-BR', { weekday:'long', day:'numeric', month:'long' });
    banner.style.display = 'flex';
    banner.style.background = currentUser.color + '18';
    banner.style.border = `1px solid ${currentUser.color}33`;
    document.getElementById('next-day-label').style.color = currentUser.color;
    return;
  }
  banner.style.display = 'none';
}

function renderCalendar() {
  const y = currentMonth.getFullYear();
  const m = currentMonth.getMonth();
  document.getElementById('month-title').textContent = `${MONTH_NAMES[m]} ${y}`;

  const firstDay = new Date(y, m, 1);
  const lastDay  = new Date(y, m+1, 0);
  const sched    = getScheduleFor(currentMonth);
  const today    = todayD();

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  // Padding inicial
  for (let i = 0; i < firstDay.getDay(); i++) {
    grid.appendChild(document.createElement('div'));
  }

  for (let day = 1; day <= lastDay.getDate(); day++) {
    const d   = new Date(y, m, day);
    const key = toKey(d);
    const resp = getResponsible(key, sched);
    const respUser = resp ? getUserById(resp) : null;

    const isToday   = toKey(d) === toKey(today);
    const isMyDay   = resp === currentUser.id;
    const isRain    = rainDays[key];
    const prev1Key  = toKey(addDays(d,-1));
    const prev2Key  = toKey(addDays(d,-2));
    const isAfterRain = (rainDays[prev1Key] || rainDays[prev2Key]) && !isRain;
    const noWater   = isRain || isAfterRain; // usado para lógica de remanejamento
    const watered   = records[key];
    const wasSkipped = skipped[key];
    const volunteerW = volunteered[key];

    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (isToday ? ' today' : '') + (isMyDay && !noWater ? ' my-day' : '');
    if (isMyDay && !noWater && respUser) {
      cell.style.setProperty('--cell-color-alpha', respUser.color + '55');
      cell.style.background = respUser.color + '12';
    }
    cell.onclick = () => openModal(key, d);

    // Número
    const num = document.createElement('div');
    num.className = 'cal-cell-num';
    num.textContent = day;
    cell.appendChild(num);

    // Indicador
    const ind = document.createElement('div');
    ind.className = 'cal-cell-indicator';

    // Emoji 🌧️ apenas no dia marcado como chuva — dias seguintes ficam sem emoji
    if (isRain) {
      ind.innerHTML = `<span class="emoji">🌧️</span>`;
    } else if (watered) {
      ind.innerHTML = `<span class="emoji">✅</span>`;
    } else if (volunteerW) {
      ind.innerHTML = `<span class="emoji">🙋</span>`;
    } else if (wasSkipped) {
      ind.innerHTML = `<span class="emoji">⏭️</span>`;
    } else if (respUser) {
      const av = document.createElement('div');
      av.className = 'mini-avatar';
      av.style.background = respUser.color;
      av.textContent = respUser.name[0];
      ind.appendChild(av);
    }

    cell.appendChild(ind);
    grid.appendChild(cell);
  }
}

          <div class="modal-info-sub">Não é necessário regar</div>
        </div>
        ${isRain ? `<button onclick="removeRain('${key}')" style="margin-left:auto;background:#1e2e1e;border:1px solid #2a3a2a;border-radius:8px;padding:4px 10px;color:#fb7185;font-size:12px;font-weight:600">Remover</button>` : ''}
      </div>`;
  } else if (respUser) {
    html += `
      <div class="modal-info-box">
        <div class="avatar" style="width:42px;height:42px;font-size:17px;background:${respUser.color};box-shadow:0 0 0 2px #0f1a0f,0 0 0 3px ${respUser.color}44;flex-shrink:0">
          ${respUser.name[0]}
        </div>
        <div>
          <div class="modal-info-sub">Responsável</div>
          <div class="modal-info-title" style="color:${respUser.color};font-size:16px">${respUser.name}</div>
          ${resp === 'karina' ? '<div style="font-size:11px;color:#4a6a4a">🌿 Domingo da Karina</div>' : ''}
        </div>
      </div>`;
  } else {
    html += `<div class="modal-info-box" style="justify-content:center;color:#4a6a4a">Dia sem rega programada</div>`;
  }

  // Registros existentes — verbos conjugados conforme passado ou futuro
  if (watered) {
    html += `<div class="modal-record" style="background:#4ade8015;border:1px solid #4ade8033">
      <div class="rec-emoji">✅</div>
      <div><div class="rec-title" style="color:#4ade80">${isFuture ? 'Vai regar' : 'Regado!'}</div>
      <div class="rec-sub">${isFuture ? 'previsto para' : 'por'} ${wateredBy?.name || '?'}</div></div>
    </div>`;
  }
  if (volunteerW) {
    html += `<div class="modal-record" style="background:#60a5fa15;border:1px solid #60a5fa33">
      <div class="rec-emoji">🙋</div>
      <div><div class="rec-title" style="color:#60a5fa">${isFuture ? 'Voluntário vai regar' : 'Voluntário regou'}</div>
      <div class="rec-sub">${isFuture ? 'previsto para' : 'por'} ${volunteerBy?.name || '?'}</div></div>
    </div>`;
  }
  if (wasSkipped) {
    html += `<div class="modal-record" style="background:#fb718515;border:1px solid #fb718533">
      <div class="rec-emoji">⏭️</div>
      <div><div class="rec-title" style="color:#fb7185">${isFuture ? 'Não poderá regar' : 'Não pôde regar'}</div></div>
    </div>`;
  }

  // Ações
  html += `<div class="modal-actions">`;

  // Confirmar rega: responsável no dia (passado ou hoje), ou qualquer um se foi pulado
  if (!noWater && respUser && !watered && (isPast || isIVolunteer) && canConfirm) {
    html += `<button class="action-btn" style="background:#4ade80;color:#0f1a0f" onclick="confirmWatered()">💧 Confirmei que reguei!</button>`;
  }

  // Desfazer voluntariado — botão único que cancela tudo (rega + voluntariado + swap)
  const iAmVolunteer = volunteerW && volunteerW.by === currentUser.id;
  const iAmCoveredBy = swaps[key] && swaps[key].coveredBy === currentUser.id;
  if (iAmVolunteer || iAmCoveredBy) {
    html += `<button class="action-btn-outline" style="border:1px solid #fbbf2444;color:#fbbf24" onclick="undoVolunteerAll()">↩️ Desfazer voluntariado</button>`;
  }

  // Desfazer rega: só para quem é responsável original do dia (não voluntário)
  if (watered && watered.by === currentUser.id && !iAmVolunteer && !iAmCoveredBy) {
    html += `<button class="action-btn-outline" style="border:1px solid #fbbf2444;color:#fbbf24" onclick="undoWatered()">↩️ Desfazer registro de rega</button>`;
  }

  // Não pôde: só o responsável original, não o voluntário
  if (!noWater && canConfirm && !watered && !wasSkipped && !isIVolunteer) {
    html += `<button class="action-btn-outline" style="border:1px solid #fb718544;color:#fb7185" onclick="confirmSkip()">${isFuture ? '😔 Não poderei regar' : '😔 Não consegui regar'}</button>`;
  }

  // Desfazer "não pôde": só quem registrou
  if (wasSkipped && wasSkipped.by === currentUser.id && !watered) {
    html += `<button class="action-btn-outline" style="border:1px solid #4ade8044;color:#4ade80" onclick="undoSkip()">↩️ Desfazer "não consegui regar"</button>`;
  }

  // Voluntário: qualquer um que não seja o responsável do dia
  if (!noWater && respUser && !watered && !volunteerW && !isMyDay) {
    html += `<button class="action-btn" style="background:#60a5fa;color:#0f1a0f" onclick="confirmVolunteer()">${isFuture ? '🙋 Eu vou regar no lugar!' : '🙋 Eu reguei no lugar!'}</button>`;
  }

  // Registrar chuva: apenas no dia atual ou passado (não é possível prever)
  if (!isRain && isPast) {
    html += `<button class="action-btn-outline" style="border:1px solid #60a5fa44;color:#60a5fa" onclick="confirmRain()">🌧️ Choveu neste dia</button>`;
  }

  html += `<button class="action-btn-close" onclick="closeModal()">Fechar</button>`;
  html += `</div>`;

  document.getElementById('modal-sheet').innerHTML = html;
  document.getElementById('modal').style.display = 'flex';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').style.display = 'none';
}

// ═══════════════════════════════════════════════════════
// AÇÕES
// ═══════════════════════════════════════════════════════
async function confirmWatered() {
  records[modalKey] = { by: currentUser.id, at: new Date().toISOString() };
  await save('rega-records', records);
  showToast('✅ Rega registrada!');
  document.getElementById('modal').style.display = 'none';
  renderCalendar();
  renderNextDay();
}

async function undoWatered() {
  try {
    delete records[modalKey];
    await saveDelete({ [`records.${modalKey}`]: deleteField() });
    showToast('↩️ Registro de rega desfeito');
    document.getElementById('modal').style.display = 'none';
    renderCalendar();
    renderNextDay();
  } catch(e) { showToast('❌ Erro ao desfazer: ' + e.message); }
}

async function confirmSkip() {
  skipped[modalKey] = { by: currentUser.id, at: new Date().toISOString() };
  await save('rega-skipped', skipped);
  showToast('⏭️ Registrado que não pôde regar');
  document.getElementById('modal').style.display = 'none';
  renderCalendar();
}

async function undoSkip() {
  try {
    delete skipped[modalKey];
    await saveDelete({ [`skipped.${modalKey}`]: deleteField() });
    showToast('↩️ Registro desfeito');
    document.getElementById('modal').style.display = 'none';
    renderCalendar();
    renderNextDay();
  } catch(e) { showToast('❌ Erro ao desfazer: ' + e.message); }
}

async function confirmVolunteer() {
  // Responsável original do calendário base (sem swaps)
  const sched        = getScheduleFor(modalDate);
  const originalResp = sched[modalKey]?.groupA || null;

  // Registra o voluntário
  volunteered[modalKey] = { by: currentUser.id, at: new Date().toISOString() };
  await save('rega-volunteered', volunteered);

  // Registra swap: próximo slot do voluntário passa para quem foi coberto
  if (originalResp && originalResp !== 'karina' && originalResp !== currentUser.id) {
    swaps[modalKey] = {
      skippedBy: originalResp,
      coveredBy: currentUser.id,
      at: new Date().toISOString(),
    };
    await save('rega-swaps', swaps);
    const skippedName = getUserById(originalResp)?.name || originalResp;
    showToast(`🙋 Obrigado! ${skippedName} assume o próximo dia de ${currentUser.name}.`);
  } else {
    showToast('🙋 Obrigado por se voluntariar!');
  }

  document.getElementById('modal').style.display = 'none';
  renderCalendar();
  renderNextDay();
}

async function undoVolunteer() {
  delete volunteered[modalKey];
  await save('rega-volunteered', volunteered);
  if (swaps[modalKey] && swaps[modalKey].coveredBy === currentUser.id) {
    delete swaps[modalKey];
    await save('rega-swaps', swaps);
  }
  showToast('↩️ Voluntariado desfeito');
  document.getElementById('modal').style.display = 'none';
  renderCalendar();
  renderNextDay();
}

// Desfaz tudo de uma vez: rega confirmada + voluntariado + swap
async function undoVolunteerAll() {
  try {
    const ref = doc(db, 'rega', 'dados');

    // Monta um único setDoc que remove todos os campos de uma vez
    // usando deleteField() — a única forma garantida de remover campos no Firestore
    const updates = {};

    if (records[modalKey] && records[modalKey].by === currentUser.id) {
      updates[`records.${modalKey}`] = deleteField();
      delete records[modalKey];
    }

    if (volunteered[modalKey]) {
      updates[`volunteered.${modalKey}`] = deleteField();
      delete volunteered[modalKey];
    }

    if (swaps[modalKey] && swaps[modalKey].coveredBy === currentUser.id) {
      updates[`swaps.${modalKey}`] = deleteField();
      delete swaps[modalKey];
    }

    if (Object.keys(updates).length > 0) {
      await updateDoc(ref, updates);
    }

    showToast('↩️ Voluntariado desfeito');
    document.getElementById('modal').style.display = 'none';
    renderCalendar();
    renderNextDay();
  } catch(e) {
    console.error('[undoVolunteerAll] Erro:', e);
    showToast('❌ Erro ao desfazer: ' + e.message);
  }
}

async function confirmRain() {
  rainDays[modalKey] = true;
  await save('rega-rain', rainDays);
  showToast('🌧️ Chuva registrada!');
  document.getElementById('modal').style.display = 'none';
  renderCalendar();
  renderNextDay();
}

async function removeRain(key) {
  try {
    delete rainDays[key];
    await saveDelete({ [`rain.${key}`]: deleteField() });
    showToast('☀️ Registro de chuva removido');
    document.getElementById('modal').style.display = 'none';
    renderCalendar();
  renderNextDay();
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = 'none'; }, 2500);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════
// ATUALIZAÇÃO AUTOMÁTICA (Service Worker + versão)
// ═══════════════════════════════════════════════════════
const APP_VERSION = '1.3.0'; // ← incrementar a cada deploy

function checkForUpdate() {
  if (!('serviceWorker' in navigator)) return;

  // Verifica se o SW tem atualização pendente
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => {
      reg.update().then(() => {
        if (reg.waiting) showUpdateBanner();
      });
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner();
          }
        });
      });
    });
  });

  // Fallback: compara versão salva no localStorage
  const savedVersion = localStorage.getItem('rega_app_version');
  if (savedVersion && savedVersion !== APP_VERSION) {
    showUpdateBanner();
  }
  localStorage.setItem('rega_app_version', APP_VERSION);
}

function showUpdateBanner() {
  document.getElementById('update-banner').style.display = 'flex';
}

function dismissUpdate() {
  document.getElementById('update-banner').style.display = 'none';
}

function doUpdate() {
  // Força o SW waiting a assumir o controle
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(reg => {
      if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    });
  });
  // Limpa caches do navegador e recarrega
  if ('caches' in window) {
    caches.keys().then(names => {
      names.forEach(name => caches.delete(name));
    }).finally(() => window.location.reload(true));
  } else {
    window.location.reload(true);
  }
}

async function init() {
  renderLoginUsers();

  // Event listeners
  document.getElementById('password-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('login-btn').addEventListener('click', doLogin);

  // ── Botão no header (pós-login) ─────────────────────────────────────────
  const notifBtn = document.getElementById('notif-btn');
  if (notifBtn) notifBtn.addEventListener('click', () => initPush());

  // ── Botão na tela de login (pré-login) ───────────────────────────────────
  // Android Chrome exige gesto do usuário para requestPermission().
  // Chamá-lo sem gesto no init() é silenciosamente ignorado.
  // Solução: botão visível antes do login que o usuário toca explicitamente.
  const notifLoginBtn = document.getElementById('notif-login-btn');
  if (notifLoginBtn) {
    notifLoginBtn.addEventListener('click', () => initPush());
    // Mostra o botão apenas se ainda não foi decidido
    navigator.serviceWorker.ready.then(() => {
      const show = isPushSupported() && Notification.permission === 'default' &&
                   !(isIOS() && !isStandalone());
      notifLoginBtn.style.display = show ? 'block' : 'none';
    }).catch(() => {});
  }

  // Carrega dados
  await loadAll();

  // Verifica atualizações
  checkForUpdate();

  // Auto-login
  const saved = localStorage.getItem('rega_logged_user');
  if (saved) {
    const u = getUserById(saved);
    if (u) { currentUser = u; showApp(); return; }
  }
}

// Expõe funções para o HTML (onclick etc.)
window.doLogin        = doLogin;
window.logout         = logout;
window.prevMonth      = prevMonth;
window.nextMonth      = nextMonth;
window.requestNotif   = requestNotif;
window.closeModal     = closeModal;
window.confirmWatered = confirmWatered;
window.undoWatered    = undoWatered;
window.confirmSkip    = confirmSkip;
window.undoSkip       = undoSkip;
window.confirmVolunteer = confirmVolunteer;
window.undoVolunteer    = undoVolunteer;
window.undoVolunteerAll = undoVolunteerAll;
window.confirmRain    = confirmRain;
window.removeRain     = removeRain;
window.doUpdate       = doUpdate;
window.dismissUpdate  = dismissUpdate;

// Compatível com Safari: não usar top-level await
init().catch(e => console.error('[App] Erro na inicialização:', e));


</script>
