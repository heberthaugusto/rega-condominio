name: Notificações de Rega

on:
  schedule:
    # 19h55 horário de Brasília = 22h55 UTC (lembrete véspera)
    - cron: '55 22 * * *'
    # 07h55 horário de Brasília = 10h55 UTC (lembrete no dia)
    - cron: '55 10 * * *'
  workflow_dispatch:
    inputs:
      data_teste:
        description: 'Data para teste (YYYY-MM-DD). Vazio = hoje/amanhã automático.'
        required: false
        default: ''
      tipo_teste:
        description: 'Tipo de notificação'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - dia
          - vespera

jobs:
  notificar:
    runs-on: ubuntu-latest
    steps:
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-webpush-v1

      - name: Instalar dependência web-push
        run: npm install web-push

      - name: Enviar notificações via Web Push nativo
        env:
          FIREBASE_PROJECT_ID:   "rega-condominio"
          FIREBASE_CLIENT_EMAIL: "firebase-adminsdk-fbsvc@rega-condominio.iam.gserviceaccount.com"
          FIREBASE_PRIVATE_KEY:  ${{ secrets.FIREBASE_PRIVATE_KEY }}
          VAPID_PUBLIC_KEY:      "BJNUDISSu-_hn1c8VxcsV9I_8oePTVeiMoyFvetvxFeY3LQeNVAfxrBv3Gk7KzaSj_4Bo_H6BaNj8tAX57c9-ec"
          VAPID_PRIVATE_KEY:     ${{ secrets.VAPID_PRIVATE_KEY }}
          INPUT_DATA_TESTE:      ${{ github.event.inputs.data_teste }}
          INPUT_TIPO_TESTE:      ${{ github.event.inputs.tipo_teste }}
        run: |
          node << 'SCRIPT'
          const https   = require('https');
          const webpush = require('web-push');

          // Timeout global: mata o processo após 45s para não travar o workflow
          const globalTimer = setTimeout(() => {
            console.error('Timeout global atingido — encerrando forçadamente');
            process.exit(1);
          }, 45000);
          // Permite que o processo encerre normalmente sem aguardar o timer
          globalTimer.unref();

          // ── Configuração VAPID ──────────────────────────────────────────────
          webpush.setVapidDetails(
            'mailto:heberthbeta@gmail.com',
            process.env.VAPID_PUBLIC_KEY,
            process.env.VAPID_PRIVATE_KEY
          );

          // ── Configuração Firebase ───────────────────────────────────────────
          const PROJECT_ID   = process.env.FIREBASE_PROJECT_ID;
          const CLIENT_EMAIL = process.env.FIREBASE_CLIENT_EMAIL;
          // Normaliza a chave privada — o secret pode ter \n literal ou quebras reais
          let PRIVATE_KEY = process.env.FIREBASE_PRIVATE_KEY;
          // Substitui \n literal por quebra de linha real
          PRIVATE_KEY = PRIVATE_KEY.replace(/\\n/g, '\n');
          // Garante que o cabeçalho/rodapé PEM estejam em linhas separadas
          if (!PRIVATE_KEY.includes('\n-----')) {
            PRIVATE_KEY = PRIVATE_KEY
              .replace('-----BEGIN PRIVATE KEY-----', '-----BEGIN PRIVATE KEY-----\n')
              .replace('-----END PRIVATE KEY-----', '\n-----END PRIVATE KEY-----');
          }
          // Log para diagnóstico (mostra só o início e fim, nunca o conteúdo)
          const pkLines = PRIVATE_KEY.split('\n');
          console.log('[Chave] Linhas:', pkLines.length, '| Início:', pkLines[0], '| Fim:', pkLines[pkLines.length-1]);

          // ── Calendário (mesma lógica do app) ────────────────────────────────
          const GROUP_A    = ['simone','flavio','bruno','luciano','heberth'];
          const START_A    = new Date('2026-05-21T00:00:00-03:00');
          const START_K    = new Date('2026-05-17T00:00:00-03:00');
          const USER_NAMES = {
            heberth: 'Heberth', simone: 'Simone', flavio: 'Flávio',
            bruno: 'Bruno', luciano: 'Luciano', karina: 'Karina'
          };

          const toKey   = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
          const isSun   = d => d.getDay() === 0;

          const karinaSundays = new Set();
          let kd = new Date(START_K);
          while (kd <= addDays(new Date(), 400)) {
            karinaSundays.add(toKey(kd));
            kd = addDays(kd, 14);
          }

          function isPostKarina(d) {
            const dow = d.getDay();
            if (dow !== 1 && dow !== 2) return false;
            return karinaSundays.has(toKey(addDays(d, -dow)));
          }

          // rainDays não está disponível no workflow (sem acesso ao Firestore em tempo real)
          // O calendário de notificações ignora chuvas — apenas estrutura de datas
          const rainDays = {};

          function nextValid(candidate) {
            let d = new Date(candidate);
            for (let g = 0; g < 60; g++) {
              const key   = toKey(d);
              const prev1 = toKey(addDays(d, -1));
              const prev2 = toKey(addDays(d, -2));
              // Regra chuva (aplicada se houver entradas em rainDays)
              if (rainDays[key])   { d = addDays(d, 3); continue; }
              if (rainDays[prev1]) { d = addDays(d, 2); continue; }
              if (rainDays[prev2]) { d = addDays(d, 1); continue; }
              // Karina
              if (karinaSundays.has(key)) { d = addDays(d, 3); continue; }
              const tomorrowKey = toKey(addDays(d, 1));
              if (karinaSundays.has(tomorrowKey)) { d = addDays(d, 4); continue; }
              if (isPostKarina(d)) { d = addDays(addDays(d, -d.getDay()), 3); continue; }
              return d;
            }
            return d;
          }

          function getResponsibleFor(targetDate) {
            const target = toKey(targetDate);
            let cur = new Date(START_A);
            let idx = 0;
            while (cur <= addDays(targetDate, 1)) {
              cur = nextValid(cur);
              if (toKey(cur) === target) return GROUP_A[idx % GROUP_A.length];
              idx++;
              cur = addDays(cur, 3);
            }
            return null;
          }

          // ── Determina responsável do dia ─────────────────────────────────────
          const now   = new Date();
          const brNow = new Date(now.toLocaleString('en-US', { timeZone: 'America/Sao_Paulo' }));
          const hour  = brNow.getHours();

          // Suporte a parâmetros manuais via workflow_dispatch
          const inputData = process.env.INPUT_DATA_TESTE || '';
          const inputTipo = process.env.INPUT_TIPO_TESTE || 'auto';

          let targetDate, tipoNotif;

          if (inputData) {
            // Modo teste: cria a data em horário de Brasília para evitar
            // deslocamento de fuso (servidor GitHub Actions roda em UTC)
            const [y, m, d] = inputData.split('-').map(Number);
            targetDate = new Date(`${inputData}T12:00:00-03:00`);
            tipoNotif  = inputTipo === 'auto'
              ? (hour >= 19 ? 'vespera' : 'dia')
              : inputTipo;
            console.log(`[TESTE] Data manual: ${inputData} | Tipo: ${tipoNotif}`);
          } else if (hour >= 19) {
            targetDate = addDays(brNow, 1);
            tipoNotif  = 'vespera';
          } else {
            targetDate = new Date(brNow);
            tipoNotif  = 'dia';
          }
          targetDate.setHours(12,0,0,0);

          const isKarinaDay = karinaSundays.has(toKey(targetDate));
          const respA       = getResponsibleFor(targetDate);
          const responsavel = isKarinaDay ? 'karina' : respA;

          if (!responsavel) {
            console.log('Nenhum responsável — sem notificação.');
            process.exit(0);
          }

          const nome    = USER_NAMES[responsavel];
          const dataStr = targetDate.toLocaleDateString('pt-BR', {
            weekday:'long', day:'numeric', month:'long', timeZone:'America/Sao_Paulo'
          });

          const titulo   = tipoNotif === 'vespera'
            ? `🌿 Amanhã é seu dia de regar!`
            : `💧 Hoje é seu dia de regar, ${nome}!`;
          const mensagem = tipoNotif === 'vespera'
            ? `${nome}, amanhã (${dataStr}) é sua vez de molhar as plantas. Não esqueça! 💧`
            : `Bom dia, ${nome}! Hoje (${dataStr}) é sua vez de molhar as plantas. Após regar, confirme no app! 🌱`;

          console.log(`Responsável: ${nome} (${tipoNotif})`);
          console.log(`Título: ${titulo}`);

          // ── Autenticação manual JWT compatível com Node 22 / OpenSSL 3 ────────
          // O Node 22 rejeita chaves PKCS#1 no crypto.createSign.
          // Solução: usar crypto.createPrivateKey() para importar explicitamente
          // a chave e assinar com o formato KeyObject, que o OpenSSL 3 aceita.
          const { createPrivateKey, createSign } = require('crypto');

          async function getAccessToken() {
            return new Promise((resolve, reject) => {
              try {
                const now2   = Math.floor(Date.now() / 1000);
                const header  = Buffer.from(JSON.stringify({ alg: 'RS256', typ: 'JWT' })).toString('base64url');
                const payload = Buffer.from(JSON.stringify({
                  iss:   CLIENT_EMAIL,
                  scope: 'https://www.googleapis.com/auth/datastore',
                  aud:   'https://oauth2.googleapis.com/token',
                  exp:   now2 + 3600,
                  iat:   now2,
                })).toString('base64url');

                const signingInput = `${header}.${payload}`;

                // createPrivateKey aceita PEM PKCS#1 e PKCS#8 no Node 22
                const privateKeyObj = createPrivateKey({ key: PRIVATE_KEY, format: 'pem' });
                const signer = createSign('RSA-SHA256');
                signer.update(signingInput);
                const sig = signer.sign(privateKeyObj, 'base64url');
                const jwt = `${signingInput}.${sig}`;

                const body = `grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=${jwt}`;
                const req  = https.request({
                  hostname: 'oauth2.googleapis.com',
                  path: '/token',
                  method: 'POST',
                  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                  timeout: 10000,
                }, res => {
                  let d = '';
                  res.on('data', c => d += c);
                  res.on('end', () => {
                    const parsed = JSON.parse(d);
                    if (parsed.access_token) resolve(parsed.access_token);
                    else reject(new Error('Token error: ' + d));
                  });
                });
                req.on('timeout', () => { req.destroy(); reject(new Error('Timeout getAccessToken')); });
                req.on('error', reject);
                req.write(body);
                req.end();
              } catch(e) { reject(e); }
            });
          }

          // Timeout global de 10s em todas as requisições HTTP
          function httpsGet(hostname, path, headers) {
            return new Promise((resolve, reject) => {
              const req = https.request({ hostname, path, method:'GET', headers, timeout: 10000 }, res => {
                let d = '';
                res.on('data', c => d += c);
                res.on('end', () => resolve({ status: res.statusCode, body: d }));
              });
              req.on('timeout', () => { req.destroy(); reject(new Error(`Timeout GET ${hostname}${path}`)); });
              req.on('error', reject);
              req.end();
            });
          }

          async function getSubscriptions(accessToken) {
            const res = await httpsGet('firestore.googleapis.com',
              `/v1/projects/${PROJECT_ID}/databases/(default)/documents/rega/subscriptions`,
              { 'Authorization': `Bearer ${accessToken}` });
            try {
              const doc    = JSON.parse(res.body);
              const fields = doc.fields || {};
              return Object.entries(fields).map(([fieldKey, val]) => {
                const m = val.mapValue?.fields || {};
                return {
                  fieldKey,
                  userId:   m.userId?.stringValue || fieldKey.split('_')[0],
                  endpoint: m.endpoint?.stringValue,
                  keys: {
                    p256dh: m.keys?.mapValue?.fields?.p256dh?.stringValue,
                    auth:   m.keys?.mapValue?.fields?.auth?.stringValue,
                  }
                };
              }).filter(s => s.endpoint && s.keys.p256dh && s.keys.auth);
            } catch(e) { return []; }
          }

          // Busca swaps e registros do Firestore para aplicar substituições
          async function getDados(accessToken) {
            const res = await httpsGet('firestore.googleapis.com',
              `/v1/projects/${PROJECT_ID}/databases/(default)/documents/rega/dados`,
              { 'Authorization': `Bearer ${accessToken}` });
            try {
              const doc    = JSON.parse(res.body);
              const fields = doc.fields || {};

              // Extrai swaps: { 'YYYY-MM-DD': { skippedBy, coveredBy } }
              const swapsRaw = fields.swaps?.mapValue?.fields || {};
              const swaps = {};
              for (const [date, val] of Object.entries(swapsRaw)) {
                const m = val.mapValue?.fields || {};
                swaps[date] = {
                  skippedBy: m.skippedBy?.stringValue,
                  coveredBy: m.coveredBy?.stringValue,
                };
              }

              // Extrai records: { 'YYYY-MM-DD': { by } }
              const recordsRaw = fields.records?.mapValue?.fields || {};
              const records = {};
              for (const [date, val] of Object.entries(recordsRaw)) {
                const m = val.mapValue?.fields || {};
                records[date] = { by: m.by?.stringValue };
              }

              // Extrai volunteered: { 'YYYY-MM-DD': { by } }
              const volRaw = fields.volunteered?.mapValue?.fields || {};
              const volunteered = {};
              for (const [date, val] of Object.entries(volRaw)) {
                const m = val.mapValue?.fields || {};
                volunteered[date] = { by: m.by?.stringValue };
              }

              return { swaps, records, volunteered };
            } catch(e) { return { swaps: {}, records: {}, volunteered: {} }; }
          }

          // Aplica swaps: se o responsável base cobriu alguém que ainda não regou,
          // o slot passa para o devedor (mesma lógica do app)
          function applySwap(baseResponsavel, dateKey, swaps, records, volunteered) {
            const pendingDebtors = Object.entries(swaps)
              .filter(([swapDate, swap]) => {
                if (swap.coveredBy !== baseResponsavel) return false;
                if (swapDate >= dateKey) return false;
                const debtor = swap.skippedBy;
                const hasRepaid =
                  Object.entries(records).some(([d, r]) => d > swapDate && r.by === debtor) ||
                  Object.entries(volunteered).some(([d, v]) => d > swapDate && v.by === debtor);
                return !hasRepaid;
              })
              .sort(([a], [b]) => a.localeCompare(b));

            if (pendingDebtors.length === 0) return baseResponsavel;
            return pendingDebtors[0][1].skippedBy;
          }

          (async () => {
            try {
              const accessToken   = await getAccessToken();
              const subscriptions = await getSubscriptions(accessToken);
              console.log(`Subscriptions encontradas: ${subscriptions.length}`);

              if (subscriptions.length === 0) {
                console.log('Nenhuma subscription registrada.');
                process.exit(0);
              }

              // Busca swaps/records do Firestore para calcular responsável real
              const { swaps, records, volunteered } = await getDados(accessToken);
              const targetKey  = toKey(targetDate);
              const responsavelFinal = responsavel === 'karina'
                ? 'karina'
                : applySwap(responsavel, targetKey, swaps, records, volunteered);

              if (responsavelFinal !== responsavel) {
                console.log(`Swap ativo: ${responsavel} → ${responsavelFinal}`);
              }

              const nomeFinal = USER_NAMES[responsavelFinal] || nome;
              const tituloFinal  = tipoNotif === 'vespera'
                ? `🌿 Amanhã é seu dia de regar!`
                : `💧 Hoje é seu dia de regar, ${nomeFinal}!`;
              const mensagemFinal = tipoNotif === 'vespera'
                ? `${nomeFinal}, amanhã (${dataStr}) é sua vez de molhar as plantas. Não esqueça! 💧`
                : `Bom dia, ${nomeFinal}! Hoje (${dataStr}) é sua vez de molhar as plantas. Após regar, confirme no app! 🌱`;

              // Filtra apenas os dispositivos do responsável final (com swap aplicado)
              const subsFiltradas = subscriptions.filter(s => s.userId === responsavelFinal);
              console.log(`Dispositivos de ${nomeFinal}: ${subsFiltradas.length}/${subscriptions.length} total`);

              if (subsFiltradas.length === 0) {
                console.log(`Nenhum dispositivo registrado para ${nomeFinal}.`);
                process.exit(0);
              }

              const payload = JSON.stringify({ title: tituloFinal, body: mensagemFinal });
              let enviados  = 0;

              for (const sub of subsFiltradas) {
                try {
                  await webpush.sendNotification(
                    { endpoint: sub.endpoint, keys: sub.keys },
                    payload
                  );
                  console.log(`✅ Notificação enviada para ${sub.userId} (${sub.fieldKey})`);
                  enviados++;
                } catch(e) {
                  console.error(`❌ Erro para ${sub.userId}: ${e.statusCode || e.message}`);
                }
              }

              console.log(`Notificações enviadas: ${enviados}/${subsFiltradas.length}`);


            } catch(e) {
              console.error('Erro geral:', e);
              process.exit(1);
            }
          })();
          SCRIPT
