name: Notificações de Rega

on:
  schedule:
    # 19h55 horário de Brasília = 22h55 UTC (lembrete véspera)
    - cron: '55 22 * * *'
    # 07h55 horário de Brasília = 10h55 UTC (lembrete no dia)
    - cron: '55 10 * * *'
  workflow_dispatch: # permite rodar manualmente para testar

jobs:
  notificar:
    runs-on: ubuntu-latest
    steps:
      - name: Calcular responsável e enviar notificação
        env:
          ONESIGNAL_APP_ID: "0968fd1e-5da0-4a20-bf3f-991dbe8f7b2f"
          ONESIGNAL_API_KEY: ${{ secrets.ONESIGNAL_API_KEY }}
        run: |
          node << 'SCRIPT'
          const https = require('https');

          // ── CONFIGURAÇÃO ──────────────────────────────────────────────
          const APP_ID     = process.env.ONESIGNAL_APP_ID;
          const API_KEY    = process.env.ONESIGNAL_API_KEY;
          const GROUP_A    = ['heberth','simone','flavio','bruno','luciano'];
          const START_A    = new Date('2026-05-19T00:00:00-03:00');
          const START_K    = new Date('2026-05-17T00:00:00-03:00');
          const USER_NAMES = {
            heberth: 'Heberth', simone: 'Simone', flavio: 'Flávio',
            bruno: 'Bruno', luciano: 'Luciano', karina: 'Karina'
          };

          // ── UTILITÁRIOS ───────────────────────────────────────────────
          function toKey(d) {
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
          }
          function addDays(d, n) {
            const r = new Date(d); r.setDate(r.getDate()+n); return r;
          }
          function isSun(d)  { return d.getDay() === 0; }
          function isMon(d)  { return d.getDay() === 1; }

          // ── MONTA DOMINGOS DA KARINA ──────────────────────────────────
          const karinaSundays = new Set();
          let kd = new Date(START_K);
          const limit = addDays(new Date(), 400);
          while (kd <= limit) { karinaSundays.add(toKey(kd)); kd = addDays(kd, 14); }

          // ── ALGORITMO DE CALENDÁRIO ───────────────────────────────────
          function getResponsibleFor(targetDate) {
            const target = toKey(targetDate);
            let cur = new Date(START_A);
            let idx = 0;
            const toDate = addDays(targetDate, 1);

            while (cur <= toDate) {
              if (isSun(cur)) { cur = addDays(cur, 1); continue; }
              const curKey  = toKey(cur);
              const prevKey = toKey(addDays(cur, -1));
              // Regra Karina: segunda após domingo dela → pula para terça
              if (isMon(cur) && karinaSundays.has(prevKey)) {
                cur = addDays(cur, 1); continue;
              }
              if (curKey === target) return GROUP_A[idx % GROUP_A.length];
              // Verifica se é domingo da Karina
              if (karinaSundays.has(curKey)) { cur = addDays(cur, 1); continue; }
              idx++;
              let next = addDays(cur, 2);
              if (isSun(next)) next = addDays(next, 1);
              const nextPrev = toKey(addDays(next, -1));
              if (isMon(next) && karinaSundays.has(nextPrev)) next = addDays(next, 1);
              cur = next;
            }
            return null;
          }

          function getKarinaResponsibleFor(targetDate) {
            return karinaSundays.has(toKey(targetDate)) ? 'karina' : null;
          }

          // ── HORÁRIO ATUAL EM BRASÍLIA ─────────────────────────────────
          const now = new Date();
          const brOffset = -3 * 60; // BRT = UTC-3
          const brNow = new Date(now.getTime() + (brOffset - now.getTimezoneOffset()) * 60000);
          const hour = brNow.getHours();

          let targetDate, tipoNotif;
          if (hour >= 19) {
            // Notificação de véspera: responsável de AMANHÃ
            targetDate = addDays(brNow, 1);
            tipoNotif  = 'vespera';
          } else {
            // Notificação do dia: responsável de HOJE
            targetDate = new Date(brNow);
            tipoNotif  = 'dia';
          }
          targetDate.setHours(0,0,0,0);

          // Descobre o responsável
          const respA = getResponsibleFor(targetDate);
          const respK = getKarinaResponsibleFor(targetDate);
          const responsavel = respK || respA;

          if (!responsavel) {
            console.log(`Nenhum responsável para ${toKey(targetDate)} — sem notificação.`);
            process.exit(0);
          }

          const nome = USER_NAMES[responsavel];
          const dataStr = targetDate.toLocaleDateString('pt-BR', {
            weekday:'long', day:'numeric', month:'long', timeZone:'America/Sao_Paulo'
          });

          let titulo, mensagem;
          if (tipoNotif === 'vespera') {
            titulo   = `🌿 Lembrete de rega — amanhã é seu dia!`;
            mensagem = `${nome}, amanhã (${dataStr}) é sua vez de molhar as plantas do condomínio. Não esqueça! 💧`;
          } else {
            titulo   = `💧 Hoje é seu dia de regar, ${nome}!`;
            mensagem = `Bom dia, ${nome}! Hoje (${dataStr}) é sua vez de molhar as plantas. Após regar, confirme no app! 🌱`;
          }

          console.log(`Enviando notificação para: ${nome} (${tipoNotif})`);
          console.log(`Título: ${titulo}`);
          console.log(`Mensagem: ${mensagem}`);

          // ── ENVIA VIA ONESIGNAL ───────────────────────────────────────
          // Envia para todos os inscritos — cada pessoa verá a notificação,
          // mas o texto deixa claro para quem é o dia.
          const payload = JSON.stringify({
            app_id: APP_ID,
            included_segments: ['All'],
            headings: { en: titulo, pt: titulo },
            contents: { en: mensagem, pt: mensagem },
            name: `rega-${tipoNotif}-${toKey(targetDate)}`
          });

          const options = {
            hostname: 'onesignal.com',
            path: '/api/v1/notifications',
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${API_KEY}`,
              'Content-Length': Buffer.byteLength(payload)
            }
          };

          const req = https.request(options, res => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              console.log(`OneSignal response (${res.statusCode}):`, data);
              process.exit(res.statusCode === 200 ? 0 : 1);
            });
          });
          req.on('error', e => { console.error('Erro:', e); process.exit(1); });
          req.write(payload);
          req.end();
          SCRIPT
